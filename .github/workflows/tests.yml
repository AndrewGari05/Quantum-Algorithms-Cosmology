name: tests

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  core-tests:
    # The pure-NumPy/SciPy correctness floor (physics, statistics, ablation
    # framework). These run without Qiskit, so CI stays fast and deterministic.
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          # Lightweight deps for the no-Qiskit test floor, matching the
          # verified environment (numpy<2 as required by Aer/cuQuantum).
          pip install "numpy==1.26.4" "scipy==1.17.1" pytest
      - name: Run core + ablation tests
        run: pytest -ra -q tests/test_core.py tests/test_ablation.py
